<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ── */
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0a;
    --bg2:#111111;
    --bg3:#1a1a1a;
    --card:#161616;
    --card-hover:#1e1e1e;
    --ink:#e8e0d8;
    --ink2:#8a8278;
    --ink3:#5a5248;
    --gold:#d4a853;
    --gold-glow:rgba(212,168,83,.15);
    --gold2:#f0c060;
    --red:#e84d3d;
    --green:#4caf50;
    --blue:#5b8def;
    --purple:#a855f7;
    --border:#222;
    --border-light:#2a2a2a;
    --radius:12px;
    --radius-sm:8px;
    --tr:.3s cubic-bezier(.22,1,.36,1);
    --font:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  html{font-size:15px;scroll-behavior:smooth}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:var(--ink3);border-radius:3px}

  /* ── Hero ── */
  .hero{
    position:relative;overflow:hidden;
    padding:80px 24px 60px;text-align:center;
    background:linear-gradient(180deg,#0d0d0d 0%,var(--bg) 100%);
  }
  .hero::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 600px 300px at 50% -20%,var(--gold-glow) 0%,transparent 70%);
    pointer-events:none;
  }
  .hero-badge{
    display:inline-block;font-size:.7rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;
    color:var(--gold);padding:4px 14px;border:1px solid var(--gold);border-radius:20px;
    margin-bottom:16px;position:relative;
  }
  .hero h1{
    font-size:clamp(2.4rem,6vw,4rem);font-weight:700;letter-spacing:-1px;position:relative;
    background:linear-gradient(135deg,var(--gold) 0%,#fff 40%,var(--gold2) 70%,var(--gold) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .hero p{color:var(--ink2);font-size:clamp(.95rem,1.2vw,1.1rem);margin-top:12px;position:relative}
  .hero .ampersand{font-style:italic;color:var(--gold)}
  /* vinyl decorations */
  .vinyl{position:absolute;width:400px;height:400px;border-radius:50%;border:2px solid var(--border-light);opacity:.03;pointer-events:none}
  .vinyl-1{top:-160px;right:-100px;width:500px;height:500px}
  .vinyl-2{bottom:-200px;left:-120px;width:450px;height:450px}
  .vinyl::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:30%;height:30%;border-radius:50%;border:2px solid var(--border-light);
    background:var(--bg);opacity:.2;
  }

  /* ── Stats bar ── */
  .stats{
    display:flex;flex-wrap:wrap;gap:12px;justify-content:center;
    padding:20px 24px;margin:-30px auto 0;max-width:800px;position:relative;z-index:2;
  }
  .stat{padding:10px 18px;text-align:center;flex:1;min-width:100px;
    backdrop-filter:blur(12px);}
.stat-btn{cursor:pointer;transition:all var(--tr)}
.stat-btn:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px var(--gold-glow)}
.stat-btn.active{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,83,.08),transparent)}
.stat-num{font-size:1.5rem;font-weight:700;color:var(--gold);display:block}
.stat-label{font-size:.72rem;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

  /* ── Layout ── */
  .container{max-width:1100px;margin:0 auto;padding:0 20px}

  /* ── Filter bar ── */
  .filters{
    display:flex;flex-wrap:wrap;gap:10px;
    padding:20px;margin:32px auto 0;
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    align-items:center;
  }
  .filters label{font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-right:4px}
  .filters select,.filters input{
    background:var(--bg2);border:1px solid var(--border);border-radius:6px;
    color:var(--ink);padding:8px 12px;font-size:.85rem;font-family:var(--font);
    transition:border-color var(--tr);
  }
  .filters select:focus,.filters input:focus{outline:none;border-color:var(--gold)}
  .filter-group{display:flex;align-items:center;gap:6px}
  .search-wrap{flex:1;min-width:180px;position:relative}
  .search-wrap input{width:100%;padding-left:32px}
  .search-wrap .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:.85rem}
  .clear-btn{
    background:var(--bg2);border:1px solid var(--border);border-radius:6px;
    color:var(--ink2);padding:8px 14px;font-size:.8rem;cursor:pointer;
    transition:all var(--tr);
  }
  .clear-btn:hover{background:var(--bg3);border-color:var(--ink3)}

  /* ── Concert list ── */
  .concerts{margin-top:24px}
  .week-section{margin-bottom:40px}
  .week-header{
    display:flex;align-items:center;gap:14px;
    padding:14px 0;border-bottom:1px solid var(--border);margin-bottom:16px;
  }
  .week-header h2{font-size:1.05rem;font-weight:600;color:var(--ink)}
  .week-header .tag{
    font-size:.65rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;
    padding:3px 10px;border-radius:20px;
  }
  .tag-new{background:var(--gold-glow);color:var(--gold);border:1px solid rgba(212,168,83,.3)}
  .tag-archive{background:var(--bg3);color:var(--ink3);border:1px solid var(--border)}
  .week-header .count{font-size:.8rem;color:var(--ink3);margin-left:auto}

  /* ── Concert card ── */
  .concert-card{
    display:grid;
    grid-template-columns: 1fr auto;
    gap:8px 16px;
    padding:14px 16px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    margin-bottom:8px;
    transition:all var(--tr);
    cursor:default;
    position:relative;
  }
  .concert-card:hover{
    background:var(--card-hover);
    border-color:var(--border-light);
    transform:translateX(3px);
  }
  .concert-card.is-new{
    border-color:rgba(212,168,83,.25);
    background:linear-gradient(135deg,var(--card) 0%,rgba(212,168,83,.04) 100%);
  }
  .concert-card.is-new::before{
    content:'★ NY';position:absolute;top:-1px;right:16px;
    font-size:.6rem;font-weight:700;letter-spacing:1px;
    color:var(--gold);
    background:linear-gradient(135deg,rgba(212,168,83,.12) 0%,rgba(212,168,83,.06) 100%);
    padding:2px 10px;border-radius:0 0 6px 6px;
    border:1px solid rgba(212,168,83,.25);border-top:none;
  }
  .concert-main{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 14px}
  .concert-artist{
    font-size:1.05rem;font-weight:600;color:var(--ink);
  }
  .concert-artist a{
    color:inherit;text-decoration:none;
  }
  .concert-artist a:hover{color:var(--gold)}
  .concert-support{
    font-size:.8rem;color:var(--ink3);
    &:before{content:'+ '}
  }
  .concert-meta{
    display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:4px;
    font-size:.82rem;color:var(--ink2);
  }
  .concert-meta span{display:flex;align-items:center;gap:4px}
  .concert-meta .icon{opacity:.5;font-size:.75rem}
  .concert-actions{
    display:flex;align-items:center;gap:8px;
    grid-column:2;grid-row:1/3;
  }
  .ticket-btn{
    display:inline-flex;align-items:center;gap:4px;
    padding:7px 14px;border-radius:6px;
    font-size:.78rem;font-weight:600;text-decoration:none;
    transition:all var(--tr);white-space:nowrap;
  }
  .ticket-btn.available{
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#0a0a0a;
  }
  .ticket-btn.available:hover{transform:scale(1.05);box-shadow:0 0 20px var(--gold-glow)}
  .ticket-btn.soldout{
    background:var(--bg3);color:var(--red);border:1px solid var(--red);cursor:not-allowed;opacity:.6
  }
  .ticket-btn.coming{background:var(--bg3);color:var(--ink2);border:1px solid var(--border);cursor:default}

  @media(max-width:600px){
    .concert-card{grid-template-columns:1fr}
    .concert-actions{grid-column:1;grid-row:auto;justify-content:flex-start;margin-top:4px}
    .ticket-btn{padding:6px 12px;font-size:.74rem}
  }

  /* ── Empty state ── */
  .empty{
    text-align:center;padding:60px 20px;color:var(--ink3);
  }
  .empty .big{font-size:3rem;margin-bottom:12px}
  .empty p{font-size:.95rem}

  /* ── Footer ── */
  footer{
    text-align:center;padding:40px 20px 60px;
    color:var(--ink3);font-size:.8rem;
    border-top:1px solid var(--border);margin-top:60px;
  }
  footer .updated{color:var(--ink2);margin-top:4px}
  footer a{color:var(--gold);text-decoration:none}
  footer a:hover{text-decoration:underline}

  /* ── Loading ── */
  .loading{text-align:center;padding:60px;color:var(--ink3)}
  .loading .spin{display:inline-block;width:24px;height:24px;
    border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;
    animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Genre badges ── */
  .genre-badge{
    display:inline-block;font-size:.62rem;font-weight:600;letter-spacing:.5px;
    padding:2px 8px;border-radius:10px;text-transform:uppercase;
  }
  .genre-rock{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
  .genre-pop{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.2)}
  .genre-electronic{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
  .genre-hiphop{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
  .genre-metal{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.2)}
  .genre-indie{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.2)}
  .genre-jazz{background:rgba(167,139,250,.15);color:#c4a7ff;border:1px solid rgba(167,139,250,.2)}
  .genre-comedy{background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
  .genre-classical{background:rgba(148,163,184,.15);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
  .genre-country{background:rgba(132,204,22,.15);color:#84cc16;border:1px solid rgba(132,204,22,.2)}
  .genre-rnb{background:rgba(217,70,239,.15);color:#d946ef;border:1px solid rgba(217,70,239,.2)}

  /* ── Responsive ── */
  @media(max-width:700px){
    .hero{padding:60px 16px 50px}
    .filters{padding:14px;flex-direction:column}
    .filter-group{width:100%}
    .filter-group select{flex:1}
    .search-wrap{width:100%}
    .stats{gap:8px}
    .stat{padding:8px 12px}
  }
</style>
</head>

    <div class="search-wrap">

    </div>
    <button class="clear-btn" id="clear-filters">Nulstil</button>
  </div>
</div>

<!-- Concert list -->
<div class="container">
  <div class="concerts" id="concert-list">
    <div class="loading"><div class="spin"></div><p style="margin-top:12px">Indlæser koncerter...</p></div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div>KoncertRadar &mdash; data fra <a href="https://www.livenation.dk/event/allevents" target="_blank" rel="noopener">Live Nation Denmark</a></div>
  <div class="updated" id="last-updated">—</div>
</footer>

<script>
(function(){
  'use strict';

  /* ── Utility ── */
  const fmtDate = iso => {
    const d = new Date(iso);
    const days = ['Søn','Man','Tir','Ons','Tor','Fre','Lør'];
    const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
    return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
  };
  const fmtTime = iso => {
    const d = new Date(iso);
    return `${String(d.getHours()).padStart(2,'0')}.${String(d.getMinutes()).padStart(2,'0')}`;
  };
  const isoDate = iso => iso ? iso.split('T')[0] : '';
  const weekNum = dateStr => {
    const d = new Date(dateStr + 'T12:00:00');
    const start = new Date(d.getFullYear(),0,1);
    const diff = (d - start + (start.getTimezoneOffset()-d.getTimezoneOffset())*60000)/86400000;
    return 1+Math.floor((diff+start.getDay()+6)/7);
  };

  /* ── Genre guesser ── */
  const genreDB = {
    'iron maiden': 'metal','volbeat': 'metal','papa roach': 'rock','alice cooper': 'rock',
    'tom morello': 'rock','trivium': 'metal','mastodon': 'metal','sepultura': 'metal',
    'babymetal': 'metal','bury tomorrow': 'metal','anthrax': 'metal','a perfect circle': 'rock',
    'social distortion': 'rock','paleface swiss': 'metal','black label society': 'metal',
    'soilwork': 'metal','the pretty reckless': 'rock','p.o.d.': 'rock','kublai khan tx': 'metal',
    'all them witches': 'rock','the weeknd': 'pop','playboi carti': 'hiphop',
    'fka twigs': 'electronic','yves tumor': 'electronic','andre rieu': 'classical',
    'tom misch': 'indie','joost klein': 'hiphop','ali wong': 'comedy','don west': 'comedy',
    'simon talbot': 'comedy','ed byrne': 'comedy','theo katzman': 'rock',
    'nora brown': 'indie','the warning': 'rock','basement': 'rock',
    'hard-ons': 'rock','guitar wolf': 'rock','the bridge city sinners': 'indie',
    'johanna rose': 'indie','sugar': 'rock','biohazard': 'metal',
    'fakemink': 'indie',
    'tlc': 'pop', 'brad paisley': 'country', 'kool & the gang': 'pop',
    'the four tops': 'pop', 'queen machine': 'rock', 'malk de koijn': 'hiphop',
    'sira jovina': 'pop', 'wafande': 'pop', 'maja francis': 'pop',
    'lisa nilsson': 'pop', 'shu-bi-dua': 'pop', 'the savage rose': 'rock',
    'birthe kjær': 'pop', 'poul krebs': 'rock', 'ulige numre': 'rock',
    'jonah blacksmith': 'indie', 'alberte winding': 'pop',
    '50 years of country': 'country', 'milo': 'pop',
  };
  const guessGenre = name => {
    const key = name.toLowerCase().trim();
    if(genreDB[key]) return genreDB[key];
    for(const [k,v] of Object.entries(genreDB))
      if(key.includes(k)) return v;
    return 'pop';
  };

  /* ── Render ── */
  function render(data){
    if(!data || !data.concerts || !data.concerts.length){
      document.getElementById('concert-list').innerHTML = '<div class="empty"><div class="big">🎵</div><p>Ingen koncerter endnu — første scraping kører snart.</p></div>';
      return;
    }

    const concerts = data.concerts;
    const now = new Date();
    const today = now.toISOString().split('T')[0];

    // Stats
    const total = concerts.length;
    const upcoming = concerts.filter(c => c.date >= today).length;
    const newThisWeek = concerts.filter(c => c.spotted === today || (c.spotted && c.spotted >= data.spotted_since)).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-upcoming').textContent = upcoming;
    document.getElementById('stat-this-week').textContent = newThisWeek;
    const soldOutCount = concerts.filter(c => c.soldOut).length;
    document.getElementById('stat-soldout').textContent = soldOutCount;
    document.getElementById('stat-spotted').textContent = concerts.filter(c => c.ticketUrl && !c.soldOut).length;

    // Filters
    const genreSet = new Set(); concerts.forEach(c => (c.genres||['pop']).forEach(g => genreSet.add(g)));
    const areaSet = new Set(); concerts.forEach(c => c.area && areaSet.add(c.area));
    // Ensure Sjælland-wide cities always appear
    ['Roskilde', 'Helsingør', 'Hillerød', 'Køge', 'Greve', 'Holbæk', 'Slagelse', 'Næstved', 'Ringsted', 'Kalundborg', 'Sorø', 'Haslev', 'Frederikssund', 'Helsinge'].forEach(a => areaSet.add(a));
    populateSelect('genre-filter', [...genreSet].sort());
    populateSelect('area-filter', [...areaSet].sort());

    applyFilters();
  }

  function populateSelect(id, items){
    const sel = document.getElementById(id);
    const cur = sel.value;
    const opts = sel.querySelectorAll('option:not(:first-child)');
    opts.forEach(o => o.remove());
    items.forEach(i => {
      const o = document.createElement('option'); o.value = i; o.textContent = i;
      sel.appendChild(o);
    });
    sel.value = cur;
  }

  function applyFilters(){
    const data = JSON.parse(document.getElementById('concert-data').textContent);
    const concerts = data.concerts;
    const genre = document.getElementById('genre-filter').value;
    const area = document.getElementById('area-filter').value;
    const status = document.getElementById('status-filter').value;
    const search = document.getElementById('search-input').value.toLowerCase().trim();
    const today = new Date().toISOString().split('T')[0];

    let filtered = concerts.filter(c => {
      if(genre && !(c.genres||['pop']).includes(genre)) return false;
      if(area && c.area !== area) return false;
      if(status === 'upcoming' && c.date < today) return false;
      if(status === 'soldout' && !c.soldOut) return false;
      if(status === 'available' && (c.soldOut || c.date < today)) return false;
      if(search && !c.artist.toLowerCase().includes(search) && !(c.support||'').toLowerCase().includes(search)) return false;
      return true;
    });

    // Sort by date ascending
    filtered.sort((a,b) => a.date.localeCompare(b.date));

    const list = document.getElementById('concert-list');
    if(!filtered.length){
      list.innerHTML = '<div class="empty"><div class="big">🔍</div><p>Ingen koncerter matcher dine filtre.</p></div>';
      return;
    }

    // Group into: new this week, upcoming, past
    const newIds = new Set(
      concerts.filter(c => c.spotted && c.spotted >= data.spotted_since).map(c => c.id)
    );

    let html = '';

    // New this week section
    const newConcerts = filtered.filter(c => newIds.has(c.id));
    if(newConcerts.length){
      html += `<div class="week-section">
        <div class="week-header">
          <h2>✦ Ny denne uge</h2>
          <span class="tag tag-new">Opdaget</span>
          <span class="count">${newConcerts.length} koncerter</span>
        </div>`;
      newConcerts.forEach(c => { html += cardHTML(c, true); });
      html += '</div>';
    }

    // Upcoming section (rest)
    const upcoming = filtered.filter(c => !newIds.has(c.id) && c.date >= today);
    if(upcoming.length){
      html += `<div class="week-section">
        <div class="week-header">
          <h2>📅 Kommende koncerter</h2>
          <span class="count">${upcoming.length} koncerter</span>
        </div>`;
      upcoming.forEach(c => { html += cardHTML(c, false); });
      html += '</div>';
    }

    // Past
    const past = filtered.filter(c => !newIds.has(c.id) && c.date < today);
    if(past.length){
      html += `<div class="week-section">
        <div class="week-header">
          <h2>🏁 Afholdte</h2>
          <span class="count">${past.length} koncerter</span>
        </div>`;
      past.forEach(c => { html += cardHTML(c, false); });
      html += '</div>';
    }

    list.innerHTML = html;

    // Update URL hash for filter state (optional, skip for now)
  }

  function cardHTML(c, isNew){
    const genres = (c.genres||['pop']).map(g => `<span class="genre-badge genre-${g}">${g}</span>`).join(' ');
    const ticketStatus = c.soldOut ? 'soldout'
      : (c.ticketUrl ? 'available' : 'coming');
    const ticketLabel = c.soldOut ? '✕ Udsolgt'
      : (c.ticketUrl ? '🎫 Billetter' : '⌛ Ikke sat til salg');
    const ticketHTML = c.ticketUrl && !c.soldOut
      ? `<a href="${c.ticketUrl}" target="_blank" rel="noopener" class="ticket-btn available">${ticketLabel}</a>`
      : `<span class="ticket-btn ${ticketStatus}">${ticketLabel}</span>`;

    const supportHTML = c.support && c.support.length
      ? `<span class="concert-support">${c.support.join(', ')}</span>` : '';

    const pastClass = c.date < new Date().toISOString().split('T')[0] ? ' style="opacity:.45"' : '';

    return `<div class="concert-card${isNew ? ' is-new' : ''}"${pastClass}>
      <div class="concert-main">
        <span class="concert-artist"><a href="${c.ticketUrl || '#'}" target="_blank" rel="noopener">${c.artist}</a></span>
        ${supportHTML}
        <span style="margin-left:auto;font-size:.72rem;color:var(--ink3)">${genres}</span>
      </div>
      <div class="concert-meta">
        <span><span class="icon">📅</span> ${fmtDate(c.date)} kl. ${fmtTime(c.date)}</span>
        <span><span class="icon">📍</span> ${c.venue}, ${c.area}</span>
        ${c.spotted ? `<span><span class="icon">👁️</span> set uge ${weekNum(c.spotted)}</span>` : ''}
      </div>
      <div class="concert-actions">${ticketHTML}</div>
    </div>`;
  }

  /* ── Event listeners ── */
  document.getElementById('genre-filter').addEventListener('change', applyFilters);
  document.getElementById('area-filter').addEventListener('change', applyFilters);
  document.getElementById('status-filter').addEventListener('change', applyFilters);
  document.getElementById('search-input').addEventListener('input', applyFilters);
  document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('genre-filter').value = '';
    document.getElementById('area-filter').value = '';
    document.getElementById('status-filter').value = '';
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
    applyFilters();
  });

  // Clickable stat buttons
  document.querySelectorAll('.stat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;
      document.querySelectorAll('.stat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('status-filter').value = '';
      if (filter === 'upcoming') document.getElementById('status-filter').value = 'upcoming';
      else if (filter === 'soldout') document.getElementById('status-filter').value = 'soldout';
      else if (filter === 'available') document.getElementById('status-filter').value = 'available';
      // 'all' and 'new' just trigger a normal re-render with default filters
      applyFilters();
    });
  });

  /* ── Init ── */
  render(JSON.parse(document.getElementById('concert-data').textContent));
  const updated = JSON.parse(document.getElementById('concert-data').textContent).updated;
  document.getElementById('last-updated').textContent = updated
    ? `Sidst opdateret: ${fmtDate(updated)} kl. ${fmtTime(updated)}`
    : '—';
})();
</script>
</body>
</html>
